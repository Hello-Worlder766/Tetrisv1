<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Tetris</title>

<style>

* {
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

body{
background:#111;
color:white;
text-align:center;
font-family:Arial;
margin:0;
user-select:none;
-webkit-user-select:none;
}

canvas{
background:black;
border:3px solid white;
touch-action:none;
display:block;
margin:0 auto;
}

#controls {
  margin-top: 15px;
  display: flex;
  flex-wrap: wrap;
  justify-content: space-around;
  width: 100%;
  max-width: 320px;
  margin-left: auto;
  margin-right: auto;
  padding-bottom: 20px;
}

.control-group {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  width: 45%;
}

button {
  background: #333;
  border: 2px solid #555;
  color: white;
  border-radius: 8px;
  font-family: Arial;
  font-weight: bold;
  touch-action: manipulation;
}

button:active {
  background: #666;
  transform: scale(0.92);
}

.btn-lg {
  font-size: 28px;
  padding: 15px 25px;
  margin: 4px;
}

.btn-round {
  font-size: 28px;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  margin: 4px;
  background: #444;
  border-color: #888;
}

.system-controls {
  width: 100%;
  margin-top: 15px;
  display: flex;
  justify-content: center;
  gap: 10px;
}

.btn-sm {
  font-size: 14px;
  padding: 8px 15px;
  background: #222;
}

</style>
</head>

<body>

<h2>Tetris</h2>
<p>Score: <span id="score">0</span></p>

<canvas id="game" width="240" height="400"></canvas>

<div id="controls-container">
  <div class="dpad">
    <div class="dpad-row">
       <button class="btn-ctrl" onpointerdown="startMove(-1)" onpointerup="stopMove()">⬅️</button>
       <button class="btn-ctrl" onpointerdown="startMove(1)" onpointerup="stopMove()">➡️</button>
    </div>
    <button class="btn-ctrl btn-down" onpointerdown="startDrop()" onpointerup="stopDrop()">⬇️</button>
  </div>

  <div class="actions">
    <button class="btn-round" onclick="rotate()">🔄</button>
    <button class="btn-round btn-hard" onclick="hardDrop()">⚡</button>
  </div>
</div>

<div class="system-bar">
  <button class="btn-sm" onclick="togglePause()" id="pauseBtn">⏸️</button>
  <button class="btn-sm" onclick="restart()">Restart</button>
</div>

<script>

document.addEventListener('touchstart', function(e) {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

let lastTouchEnd = 0;
document.addEventListener('touchend', function(e) {
  const now = Date.now();
  if (now - lastTouchEnd < 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

ctx.scale(20,20)

const arena = createMatrix(12,20)

const colors = [null,'#ff595e','#ffca3a','#8ac926','#1982c4','#6a4c93','#f72585']

const pieces = [
[[1,1,1],[0,1,0]],
[[2,2],[2,2]],
[[0,3,3],[3,3,0]],
[[4,4,0],[0,4,4]],
[[5,5,5,5]]
]

let player = { pos:{x:0,y:0}, matrix:null, score:0 }

function createMatrix(w,h){
  const m=[]
  while(h--) m.push(new Array(w).fill(0))
  return m
}

function drawMatrix(matrix,offset){
  matrix.forEach((row,y)=>{
    row.forEach((value,x)=>{
      if(value!==0){
        ctx.fillStyle=colors[value]
        ctx.fillRect(x+offset.x,y+offset.y,1,1)
      }
    })
  })
}

function draw(){
  ctx.fillStyle="#000"
  ctx.fillRect(0,0,canvas.width,canvas.height)
  drawMatrix(arena,{x:0,y:0})
  drawMatrix(player.matrix,player.pos)
}

function merge(){
  player.matrix.forEach((row,y)=>{
    row.forEach((value,x)=>{
      if(value!==0) arena[y+player.pos.y][x+player.pos.x]=value
    })
  })
}

function collide(){
  const m=player.matrix, o=player.pos
  for(let y=0;y<m.length;y++){
    for(let x=0;x<m[y].length;x++){
      if(m[y][x]!==0 && (arena[y+o.y] && arena[y+o.y][x+o.x])!==0) return true
    }
  }
  return false
}

function playerReset(){
  player.matrix = JSON.parse(JSON.stringify(pieces[Math.floor(Math.random()*pieces.length)]))
  player.pos.y=0
  player.pos.x=(arena[0].length/2|0)-(player.matrix[0].length/2|0)
  if(collide()){
    arena.forEach(row=>row.fill(0))
    player.score=0
    updateScore()
  }
}

function arenaSweep(){
  let rowCount=1
  outer: for(let y=arena.length-1;y>=0;y--){
    for(let x=0;x<arena[y].length;x++){
      if(arena[y][x]===0) continue outer
    }
    const row=arena.splice(y,1)[0].fill(0)
    arena.unshift(row)
    y++
    player.score+=rowCount*10
    rowCount*=2
  }
  updateScore()
}

function move(dir){
  player.pos.x+=dir
  if(collide()) player.pos.x-=dir
}

// Fixed rotation that works for non-square matrices
function rotateMatrix(matrix){
  const rows = matrix.length
  const cols = matrix[0].length
  const result = Array.from({length: cols}, () => new Array(rows).fill(0))
  for(let y=0; y<rows; y++){
    for(let x=0; x<cols; x++){
      result[x][rows-1-y] = matrix[y][x]
    }
  }
  return result
}

function rotate(){
  const old = player.matrix
  const oldX = player.pos.x
  player.matrix = rotateMatrix(player.matrix)

  // Wall kick
  let offset = 1
  while(collide()){
    player.pos.x += offset
    offset = -(offset + (offset > 0 ? 1 : -1))
    if(Math.abs(offset) > player.matrix[0].length){
      player.matrix = old
      player.pos.x = oldX
      return
    }
  }
}

function drop(){
  player.pos.y++
  if(collide()){
    player.pos.y--
    merge()
    arenaSweep()
    playerReset()
  }
  dropCounter=0
}

function hardDrop(){
  while(!collide()) player.pos.y++
  player.pos.y--
  merge()
  arenaSweep()
  playerReset()
  dropCounter=0
}

function updateScore(){
  document.getElementById("score").innerText=player.score
}

let dropCounter=0
let dropInterval=800
let lastTime=0
let paused=false

function togglePause(){
  paused=!paused
  document.getElementById("pauseBtn").innerText = paused ? "▶️" : "⏸️"
  if(!paused){ lastTime=0; update() }
}

function update(time=0){
  if(paused) return
  const delta=time-lastTime
  lastTime=time
  dropCounter+=delta
  if(dropCounter>dropInterval) drop()
  draw()
  requestAnimationFrame(update)
}

function restart(){
  arena.forEach(row=>row.fill(0))
  player.score=0
  updateScore()
  playerReset()
}

document.addEventListener("keydown",event=>{
  if(event.key==="ArrowLeft") move(-1)
  if(event.key==="ArrowRight") move(1)
  if(event.key==="ArrowDown") drop()
  if(event.key==="ArrowUp") rotate()
  if(event.key===" ") hardDrop()
  if(event.key==="p"||event.key==="P") togglePause()
})

let startX=0, startY=0, tapTime=0

canvas.addEventListener("touchstart",e=>{
  e.preventDefault()
  startX=e.touches[0].clientX
  startY=e.touches[0].clientY
}, { passive: false })

let rotatePending = null

canvas.addEventListener("touchend",e=>{
  e.preventDefault()
  const now = Date.now()
  const dx = e.changedTouches[0].clientX - startX
  const dy = e.changedTouches[0].clientY - startY
  const isTap = Math.abs(dx) < 20 && Math.abs(dy) < 20

  if(isTap && now - tapTime < 300){
    if(rotatePending){ clearTimeout(rotatePending); rotatePending=null }
    hardDrop()
    tapTime = 0
    return
  }

  tapTime = now

  if(Math.abs(dx) > Math.abs(dy)){
    if(dx > 30) move(1)
    if(dx < -30) move(-1)
  } else {
    if(dy > 30) drop()
    else if(isTap){
      rotatePending = setTimeout(()=>{ rotate(); rotatePending=null }, 300)
    }
  }
}, { passive: false })

playerReset()
updateScore()
update()

</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Tetris Mobile</title>
<style>
* { -webkit-tap-highlight-color: transparent; touch-action: manipulation; box-sizing: border-box; }
body { background:#111; color:white; text-align:center; font-family:Arial; margin:0; user-select:none; -webkit-user-select:none; overflow: hidden; }

canvas { background:black; border:3px solid white; display:block; margin:5px auto; max-height: 50vh; width: auto; }

#controls { margin-top: 10px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; }

.main-controls { display: flex; justify-content: center; gap: 6px; width: 98%; }

/* Game Buttons */
.btn-game {
    width: 18%; max-width: 65px; height: 60px; font-size: 24px;
    display: flex; align-items: center; justify-content: center;
    background: #333; border: 2px solid #555; border-radius: 12px;
    box-shadow: 0 4px #111; transition: all 0.05s;
}
.btn-game:active { transform: translateY(3px); box-shadow: 0 1px #111; background: #444; }

.btn-rotate { background: #444; border-color: #888; }
.btn-power { background: #f72585; border-color: #ff595e; }

/* System Buttons */
.system-controls { display: flex; gap: 20px; margin-top: 5px; }
.btn-sys { padding: 10px 20px; font-size: 14px; background: #222; border: 1px solid #444; border-radius: 8px; color: #aaa; }

h2 { margin: 10px 0 5px; font-size: 1.2rem; }
p { margin: 5px 0; }
</style>
</head>
<body>

<h2>Tetris</h2>
<p>Score: <span id="score">0</span></p>

<canvas id="game" width="240" height="400"></canvas>

<div id="controls">
  <div class="main-controls">
    <button class="btn-game" onpointerdown="startMove(-1)" onpointerup="stopMove()" onpointerleave="stopMove()">⬅️</button>
    <button class="btn-game" onpointerdown="startMove(1)" onpointerup="stopMove()" onpointerleave="stopMove()">➡️</button>
    <button class="btn-game" onpointerdown="startDrop()" onpointerup="stopDrop()" onpointerleave="stopDrop()">⬇️</button>
    <button class="btn-game btn-rotate" onclick="handleRotate()">🔄</button>
    <button class="btn-game btn-power" onclick="handleHardDrop()">⚡</button>
  </div>

  <div class="system-controls">
    <button class="btn-sys" onclick="togglePause()" id="pauseBtn">⏸️</button>
    <button class="btn-sys" onclick="restart()">Restart</button>
  </div>
</div>

<script>
// Game State
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
ctx.scale(20,20);

const colors = [null,'#ff595e','#ffca3a','#8ac926','#1982c4','#6a4c93','#f72585'];
const pieces = [[[1,1,1],[0,1,0]], [[2,2],[2,2]], [[0,3,3],[3,3,0]], [[4,4,0],[0,4,4]], [[5,5,5,5]]];
let arena = createMatrix(12,20);
let player = { pos:{x:0,y:0}, matrix:null, score:0 };
let dropCounter=0, dropInterval=800, lastTime=0, paused=false;
let moveTimer, dropTimer;

// Core Logic
function createMatrix(w,h){
    const m=[]; while(h--) m.push(new Array(w).fill(0)); return m;
}

function collide(){
    const [m, o] = [player.matrix, player.pos];
    for(let y=0; y<m.length; y++){
        for(let x=0; x<m[y].length; x++){
            if(m[y][x]!==0 && (arena[y+o.y] && arena[y+o.y][x+o.x])!==0) return true;
        }
    }
    return false;
}

function merge(){
    player.matrix.forEach((row,y)=>{
        row.forEach((value,x)=>{
            if(value!==0) arena[y+player.pos.y][x+player.pos.x]=value;
        });
    });
}

function playerReset(){
    player.matrix = JSON.parse(JSON.stringify(pieces[Math.floor(Math.random()*pieces.length)]));
    player.pos.y=0;
    player.pos.x=(arena[0].length/2|0)-(player.matrix[0].length/2|0);
    if(collide()){ arena.forEach(row=>row.fill(0)); player.score=0; updateScore(); }
}

function arenaSweep(){
    let rowCount=1;
    outer: for(let y=arena.length-1; y>=0; y--){
        for(let x=0; x<arena[y].length; x++) if(arena[y][x]===0) continue outer;
        const row = arena.splice(y,1)[0].fill(0);
        arena.unshift(row); y++;
        player.score += rowCount*10; rowCount*=2;
    }
    updateScore();
}

function updateScore(){ document.getElementById("score").innerText=player.score; }

// Movement functions
function move(dir){
    player.pos.x+=dir;
    if(collide()) player.pos.x-=dir;
}

function rotate(){
    const oldMatrix = player.matrix;
    player.matrix = rotateMatrix(player.matrix);
    let offset = 1;
    const oldX = player.pos.x;
    while(collide()){
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));
        if(Math.abs(offset) > player.matrix[0].length){
            player.matrix = oldMatrix;
            player.pos.x = oldX;
            return;
        }
    }
}

function rotateMatrix(matrix){
    return matrix[0].map((_, i) => matrix.map(row => row[i]).reverse());
}

function drop(){
    player.pos.y++;
    if(collide()){ player.pos.y--; merge(); arenaSweep(); playerReset(); }
    dropCounter=0;
}

// Input Handlers
function startMove(dir){
    if(paused) return;
    move(dir); draw();
    moveTimer = setInterval(() => { move(dir); draw(); }, 120);
}
function stopMove(){ clearInterval(moveTimer); }

function startDrop(){
    if(paused) return;
    drop(); draw();
    dropTimer = setInterval(() => { drop(); draw(); }, 50);
}
function stopDrop(){ clearInterval(dropTimer); }

function handleRotate(){ if(!paused) { rotate(); draw(); }}

function handleHardDrop(){
    if(paused) return;
    while(!collide()) player.pos.y++;
    player.pos.y--; merge(); arenaSweep(); playerReset();
    draw();
}

function togglePause(){
    paused=!paused;
    document.getElementById("pauseBtn").innerText = paused ? "▶️" : "⏸️";
    if(!paused){ lastTime=0; update(); }
}

function restart(){
    arena.forEach(row=>row.fill(0));
    player.score=0; updateScore(); playerReset(); draw();
}

// Draw Loop
function draw(){
    ctx.fillStyle="#000";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    drawMatrix(arena,{x:0,y:0});
    drawMatrix(player.matrix,player.pos);
}

function drawMatrix(matrix,offset){
    matrix.forEach((row,y)=>{
        row.forEach((value,x)=>{
            if(value!==0){
                ctx.fillStyle=colors[value];
                ctx.fillRect(x+offset.x,y+offset.y,1,1);
            }
        });
    });
}

function update(time=0){
    if(paused) return;
    const delta=time-lastTime; lastTime=time;
    dropCounter+=delta;
    if(dropCounter>dropInterval) drop();
    draw();
    requestAnimationFrame(update);
}

// Prevent zoom/scrolling
document.addEventListener('touchstart', e => { if(e.touches.length > 1) e.preventDefault(); }, {passive:false});

playerReset();
update();
</script>
</body>
</html>

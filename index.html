<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Tetris</title>

<style>

body{
background:#111;
color:white;
text-align:center;
font-family:Arial;
margin:0;
}

canvas{
background:black;
border:3px solid white;
touch-action:none;
}

#controls{
margin-top:10px;
}

button{
font-size:22px;
margin:5px;
padding:12px 18px;
touch-action:manipulation;
}

</style>
</head>

<body>

<h2>Tetris</h2>
<p>Score: <span id="score">0</span></p>

<canvas id="game" width="240" height="400"></canvas>

<div id="controls">
<button onclick="move(-1)">⬅️</button>
<button onclick="rotate()">🔄</button>
<button onclick="move(1)">➡️</button>
<button onclick="drop()">⬇️</button>
<button onclick="restart()">Restart</button>
</div>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

ctx.scale(20,20)

const arena = createMatrix(12,20)

const colors = [
null,
'#ff595e',
'#ffca3a',
'#8ac926',
'#1982c4',
'#6a4c93',
'#f72585'
]

const pieces = [
[[1,1,1],[0,1,0]],
[[2,2],[2,2]],
[[0,3,3],[3,3,0]],
[[4,4,0],[0,4,4]],
[[5,5,5,5]]
]

let player = {
pos:{x:0,y:0},
matrix:null,
score:0
}

function createMatrix(w,h){
const m=[]
while(h--) m.push(new Array(w).fill(0))
return m
}

function drawMatrix(matrix,offset){
matrix.forEach((row,y)=>{
row.forEach((value,x)=>{
if(value!==0){
ctx.fillStyle=colors[value]
ctx.fillRect(x+offset.x,y+offset.y,1,1)
}
})
})
}

function draw(){
ctx.fillStyle="#000"
ctx.fillRect(0,0,canvas.width,canvas.height)

drawMatrix(arena,{x:0,y:0})
drawMatrix(player.matrix,player.pos)
}

function merge(){
player.matrix.forEach((row,y)=>{
row.forEach((value,x)=>{
if(value!==0){
arena[y+player.pos.y][x+player.pos.x]=value
}
})
})
}

function collide(){
const m=player.matrix
const o=player.pos

for(let y=0;y<m.length;y++){
for(let x=0;x<m[y].length;x++){
if(
m[y][x]!==0 &&
(arena[y+o.y] && arena[y+o.y][x+o.x])!==0
){
return true
}
}
}

return false
}

function playerReset(){
player.matrix = JSON.parse(JSON.stringify(
pieces[Math.floor(Math.random()*pieces.length)]
))

player.pos.y=0
player.pos.x=(arena[0].length/2|0)-(player.matrix[0].length/2|0)

if(collide()){
arena.forEach(row=>row.fill(0))
player.score=0
updateScore()
}
}

function arenaSweep(){

let rowCount=1

outer: for(let y=arena.length-1;y>=0;y--){

for(let x=0;x<arena[y].length;x++){
if(arena[y][x]===0) continue outer
}

const row=arena.splice(y,1)[0].fill(0)
arena.unshift(row)
y++

player.score+=rowCount*10
rowCount*=2

}

updateScore()

}

function move(dir){
player.pos.x+=dir
if(collide()) player.pos.x-=dir
}

function rotate(){

const matrix = player.matrix
const N = matrix.length

const rotated = matrix.map((row,i)=>
row.map((val,j)=>matrix[N-j-1][i])
)

const old = player.matrix
player.matrix = rotated

if(collide()){
player.matrix = old
}

}

function drop(){

player.pos.y++

if(collide()){
player.pos.y--
merge()
arenaSweep()
playerReset()
}

dropCounter=0

}

function updateScore(){
document.getElementById("score").innerText=player.score
}

let dropCounter=0
let dropInterval=800
let lastTime=0

function update(time=0){

const delta=time-lastTime
lastTime=time

dropCounter+=delta

if(dropCounter>dropInterval){
drop()
}

draw()

requestAnimationFrame(update)

}

function restart(){
arena.forEach(row=>row.fill(0))
player.score=0
updateScore()
playerReset()
}

document.addEventListener("keydown",event=>{

if(event.key==="ArrowLeft") move(-1)
if(event.key==="ArrowRight") move(1)
if(event.key==="ArrowDown") drop()
if(event.key==="ArrowUp") rotate()

})

/* TOUCH CONTROLS */

let startX=0
let startY=0

canvas.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
startY=e.touches[0].clientY
})

canvas.addEventListener("touchend",e=>{

const dx = e.changedTouches[0].clientX - startX
const dy = e.changedTouches[0].clientY - startY

if(Math.abs(dx)>Math.abs(dy)){

if(dx>30) move(1)
if(dx<-30) move(-1)

}else{

if(dy>30) drop()

}

})

canvas.addEventListener("click",()=>{
rotate()
})

playerReset()
updateScore()
update()

</script>

</body>
</html>
